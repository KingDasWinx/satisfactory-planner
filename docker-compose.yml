services:

  # ── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-planner}
      POSTGRES_DB:       ${POSTGRES_DB:-planner}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-planner} -d ${POSTGRES_DB:-planner}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js app ───────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Constrói a DATABASE_URL apontando para o serviço "db" interno.
      # Se quiser usar um banco externo, comente esta linha e defina
      # DATABASE_URL no seu .env manualmente.
      DATABASE_URL: "postgresql://${POSTGRES_USER:-planner}:${POSTGRES_PASSWORD:-planner}@db:5432/${POSTGRES_DB:-planner}"

      AUTH_SECRET:      ${AUTH_SECRET}
      AUTH_TRUST_HOST:  ${AUTH_TRUST_HOST:-true}

      # OAuth — deixe em branco para desabilitar o provedor
      AUTH_GITHUB_ID:     ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      AUTH_GOOGLE_ID:     ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}

volumes:
  postgres_data:
