services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: satisfactory
      POSTGRES_PASSWORD: satisfactory
      POSTGRES_DB: satisfactory_planner
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satisfactory -d satisfactory_planner"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        DATABASE_URL: postgresql://satisfactory:satisfactory@db:5432/satisfactory_planner?schema=public
        AUTH_SECRET: ${AUTH_SECRET}
        AUTH_TRUST_HOST: "true"
    restart: unless-stopped
    ports:
      - "6756:3000"
    environment:
      DATABASE_URL: postgresql://satisfactory:satisfactory@db:5432/satisfactory_planner?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
