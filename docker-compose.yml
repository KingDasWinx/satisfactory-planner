services:

  # ── Next.js app ───────────────────────────────────────────────
  # O banco de dados é gerenciado separadamente pelo Dokploy.
  # Configure DATABASE_URL nas variáveis de ambiente do serviço
  # apontando para o Postgres interno do Dokploy.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
